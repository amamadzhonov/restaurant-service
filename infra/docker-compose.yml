services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: restaurant_menu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d restaurant_menu"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ../apps/api
    env_file:
      - ../apps/api/.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/restaurant_menu
      SYNC_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/restaurant_menu
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "alembic upgrade head && python3 -m app.seed_demo && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ../apps/api:/app

  worker:
    build:
      context: ../apps/api
    env_file:
      - ../apps/api/.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/restaurant_menu
      SYNC_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/restaurant_menu
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_started
    command: celery -A app.tasks.worker.celery_app worker --loglevel=info
    volumes:
      - ../apps/api:/app

  web:
    build:
      context: ../apps/web
    env_file:
      - ../apps/web/.env.example
    environment:
      API_URL: http://api:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    volumes:
      - ../apps/web:/app
      - /app/node_modules

volumes:
  postgres-data:
