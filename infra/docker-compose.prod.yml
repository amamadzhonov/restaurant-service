services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: restaurant_menu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d restaurant_menu"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    build:
      context: ../apps/api
    restart: unless-stopped
    env_file:
      - ../apps/api/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - api-media:/app/media

  worker:
    build:
      context: ../apps/api
    restart: unless-stopped
    env_file:
      - ../apps/api/.env.production
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_started
    command: celery -A app.tasks.worker.celery_app worker --loglevel=info
    volumes:
      - api-media:/app/media

  web:
    build:
      context: ../apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    restart: unless-stopped
    env_file:
      - ../apps/web/.env.production
    environment:
      API_URL: http://api:8000/api/v1
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  api-media:
